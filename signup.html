<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Spotify</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ==========================================================================
   GLOBAL RESETS & THEME CONFIGURATION
   ========================================================================== */
:root {
    --bg-black: #000000;
    --bg-card: #121212;
    --bg-input: #1a1a1a;
    --bg-input-hover: #242424;
    --text-main: #ffffff;
    --text-muted: #b3b3b3;
    --spotify-green: #1db954;
    --spotify-green-hover: #1ed760;
    --error-red: #f15555;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-black);
    color: var(--text-main);
    font-family: "Montserrat", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
}

/* ==========================================================================
   HEADER LOGO AREA
   ========================================================================== */
.signup-header {
    padding: 2rem;
    display: flex;
    justify-content: center;
}

.signup-header .logo {
    font-size: 2.5rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    letter-spacing: -1px;
}

.signup-header .logo i {
    color: var(--text-main);
    font-size: 2.8rem;
}

/* ==========================================================================
   SIGNUP MAIN CARD CONTEXT
   ========================================================================== */
.signup-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0 1rem 4rem 1rem;
}

.signup-card {
    background-color: var(--bg-card);
    width: 100%;
    max-width: 450px;
    padding: 3rem 2.5rem;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
}

.signup-card h1 {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 2rem;
    text-align: center;
}

/* INPUT FORM COMPONENT TRACKS */
.input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 1.25rem;
    position: relative;
}

.input-group label {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
}

.input-group input {
    background-color: var(--bg-input);
    border: 1px solid #727272;
    color: var(--text-main);
    height: 3rem;
    padding: 0 1rem;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.2s ease;
}

.input-group input:hover {
    background-color: var(--bg-input-hover);
    border-color: #a7a7a7;
}

.input-group input:focus {
    outline: none;
    background-color: var(--bg-input-hover);
    border: 2px solid var(--text-main);
    padding: 0 0.93rem; /* Compels text spacing balance offset for 2px thick borders */
}

/* Dynamic error input states */
.input-group.invalid input {
    border: 2px solid var(--error-red) !important;
    padding: 0 0.93rem;
}

.error-msg {
    color: var(--error-red);
    font-size: 0.75rem;
    font-weight: 500;
    margin-top: 0.4rem;
    display: none;
}

.input-tip {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
}

/* PASSWORD VISIBILITY TOGGLE SYSTEM */
.password-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
}

.password-wrapper input {
    width: 100%;
    padding-right: 3rem !important;
}

.toggle-password {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.1rem;
    transition: color 0.2s;
}

.toggle-password:hover {
    color: var(--text-main);
}

/* ACTION BUTTON */
.submit-btn {
    width: 100%;
    height: 3rem;
    background-color: var(--spotify-green);
    color: #000000;
    border: none;
    border-radius: 500px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.2s ease;
}

.submit-btn:hover {
    transform: scale(1.03);
    background-color: var(--spotify-green-hover);
}

.submit-btn:active {
    transform: scale(0.98);
}

/* FOOTER SEGMENTATION */
.divider {
    height: 1px;
    background-color: #292929;
    margin: 2rem 0;
}

.login-redirect {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 500;
}

.login-redirect a {
    color: var(--text-main);
    font-weight: 600;
    text-decoration: underline;
    transition: color 0.2s;
}

.login-redirect a:hover {
    color: var(--spotify-green);
}

/* ==========================================================================
   RESPONSIVE LAYOUT ENGINE BREAKPOINT
   ========================================================================== */
@media (max-width: 480px) {
    .signup-header {
        padding: 1.5rem;
    }
    .signup-container {
        padding: 0;
    }
    .signup-card {
        border-radius: 0;
        box-shadow: none;
        padding: 2rem 1.5rem;
        background-color: var(--bg-black); /* Flush clean layout integration on mobile sizes */
    }
}
    </style>
</head>
<body>

    <header class="signup-header">
        <div class="logo">
            <i class="fa-brands fa-spotify"></i>
            <span>Spotify</span>
        </div>
    </header>

    <main class="signup-container">
        <div class="signup-card">
            <h1>Sign up to start listening</h1>
            
            <form id="signupForm">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="name@domain.com" required autocomplete="email">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="password">Create a password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
                        <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="input-group">
                    <label for="username">What should we call you?</label>
                    <input type="text" id="username" placeholder="Enter a profile name" required autocomplete="username">
                    <p class="input-tip">This appears on your profile.</p>
                    <span class="error-msg" id="nameError"></span>
                </div>

                <button type="submit" class="submit-btn">Sign Up</button>
            </form>

            <div class="divider"></div>

            <p class="login-redirect">
                Already have an account? <a href="login.html">Log in here</a>.
            </p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const signupForm = document.getElementById('signupForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const usernameInput = document.getElementById('username');
    
    const togglePassword = document.getElementById('togglePassword');

    // ==========================================================================
    // PASSWORD EYE TOGGLE SYSTEM VISIBILITY CONTROL
    // ==========================================================================
    togglePassword.addEventListener('click', () => {
        const isPasswordHidden = passwordInput.getAttribute('type') === 'password';
        
        if (isPasswordHidden) {
            passwordInput.setAttribute('type', 'text');
            togglePassword.classList.remove('fa-eye-slash');
            togglePassword.classList.add('fa-eye');
        } else {
            passwordInput.setAttribute('type', 'password');
            togglePassword.classList.remove('fa-eye');
            togglePassword.classList.add('fa-eye-slash');
        }
    });

    // ==========================================================================
    // INLINE ERROR HANDLING UTILITIES
    // ==========================================================================
    function triggerValidationError(inputElement, errorElement, message) {
        const group = inputElement.closest('.input-group');
        group.classList.add('invalid');
        errorElement.innerText = message;
        errorElement.style.display = 'block';
    }

    function clearValidationError(inputElement, errorElement) {
        const group = inputElement.closest('.input-group');
        group.classList.remove('invalid');
        errorElement.innerText = '';
        errorElement.style.display = 'none';
    }

    // ==========================================================================
    // DATA INTEGRITY FIELD CHECK MECHANICS
    // ==========================================================================
    function checkEmail() {
        const emailValue = emailInput.value.trim();
        const emailError = document.getElementById('emailError');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailValue === "") {
            triggerValidationError(emailInput, emailError, "You need to enter your email.");
            return false;
        } else if (!emailRegex.test(emailValue)) {
            triggerValidationError(emailInput, emailError, "This email is invalid. Make sure it's written like name@domain.com.");
            return false;
        }
        
        clearValidationError(emailInput, emailError);
        return true;
    }

    function checkPassword() {
        const passwordValue = passwordInput.value;
        const passwordError = document.getElementById('passwordError');

        if (passwordValue.length < 6) {
            triggerValidationError(passwordInput, passwordError, "Your password must be at least 6 characters.");
            return false;
        }
        
        clearValidationError(passwordInput, passwordError);
        return true;
    }

    function checkUsername() {
        const usernameValue = usernameInput.value.trim();
        const nameError = document.getElementById('nameError');

        if (usernameValue === "") {
            triggerValidationError(usernameInput, nameError, "Enter a name for your profile.");
            return false;
        }
        
        clearValidationError(usernameInput, nameError);
        return true;
    }

    // Clear validation warnings immediately as the developer types inside inputs
    emailInput.addEventListener('input', checkEmail);
    passwordInput.addEventListener('input', checkPassword);
    usernameInput.addEventListener('input', checkUsername);

    // ==========================================================================
    // OVERALL FORM INTERCEPT ACTION
    // ==========================================================================
    signupForm.addEventListener('submit', (e) => {
        e.preventDefault(); // Stop raw default window navigation loops

        // Validate all variables concurrently
        const isEmailValid = checkEmail();
        const isPasswordValid = checkPassword();
        const isUsernameValid = checkUsername();

        if (isEmailValid && isPasswordValid && isUsernameValid) {
            alert('Success! Your Spotify account registration flow completed.');
            
            // Redirect smoothly to your index screen frame context
            window.location.href = 'index.html'; 
        }
    });
});
    </script>
</body>
</html>
